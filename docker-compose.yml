x-common: &common
  networks:
    - fastauto-network
services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:${POSTGRES_IMAGE_TAG:-17-alpine}
    restart: unless-stopped
    command:
      - postgres
      - -c
      - max_connections=${PG_MAX_CONNECTIONS:-100}
      - -c
      - shared_buffers=${PG_SHARED_BUFFERS:-512MB}
      - -c
      - effective_cache_size=${PG_EFFECTIVE_CACHE_SIZE:-2GB}
      - -c
      - work_mem=${PG_WORK_MEM:-8MB}
      - -c
      - maintenance_work_mem=${PG_MAINTENANCE_WORK_MEM:-128MB}
      - -c
      - wal_buffers=${PG_WAL_BUFFERS:-16MB}
      - -c
      - random_page_cost=${PG_RANDOM_PAGE_COST:-1.1}
      - -c
      - effective_io_concurrency=${PG_EFFECTIVE_IO_CONCURRENCY:-200}
      - -c
      - checkpoint_completion_target=${PG_CHECKPOINT_COMPLETION_TARGET:-0.9}
      - -c
      - log_min_duration_statement=${PG_LOG_MIN_DURATION_STATEMENT:-100}
      - -c
      - synchronous_commit=off
      - -c
      - autovacuum_vacuum_scale_factor=0.05
      - -c
      - autovacuum_analyze_scale_factor=0.02
      - -c
      - autovacuum_vacuum_cost_delay=2ms
      - -c
      - autovacuum_vacuum_cost_limit=2000
      - -c
      - autovacuum_naptime=30s
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Variable not set}
      POSTGRES_DB: ${POSTGRES_DB:-car_sales}
    volumes:
      - db_data:/var/lib/postgresql/data
    <<: *common
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:${REDIS_IMAGE_TAG:-7-alpine}
    restart: unless-stopped
    command: >
      redis-server
      --save ""
      --appendonly no
      --maxmemory ${REDIS_MAX_MEMORY:-256mb}
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    <<: *common
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO ────────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:${MINIO_IMAGE_TAG:-latest}
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Создаёт бакет при первом запуске
  minio-setup:
    image: minio/mc:${MINIO_MC_IMAGE_TAG:-latest}
    restart: on-failure
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin};
        mc mb --ignore-existing local/${MINIO_BUCKET:-car-sales};
        mc anonymous set download local/${MINIO_BUCKET:-car-sales};
      "

  # ── Backend (FastAPI + Granian) ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    stop_grace_period: 30s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file: .env
    environment:
      ENVIRONMENT: production
      POSTGRES_SERVER: db
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      MINIO_ENDPOINT: minio:9000
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost/minio}
      TRUST_PROXY_HEADERS: "true"
      BACKEND_WORKERS: "${BACKEND_WORKERS:-2}"
      DB_POOL_SIZE: "5"
      DB_MAX_OVERFLOW: "5"
      REDIS_MAX_CONNECTIONS: "50"
    command: ["/app/scripts/start.sh"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    <<: *common
  # ── nginx: раздаёт фронтенд + проксирует API ─────────────────────────────────
  nginx:
    build:
      # Контекст — корень репозитория, чтобы скопировать frontend/
      context: .
      dockerfile: backend/Dockerfile.nginx
      args:
        VITE_API_URL: ${VITE_API_URL:-/api/v1}
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./backend/nginx/nginx_main.conf:/etc/nginx/nginx.conf:ro
      - ./backend/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/nginx/security_headers.conf:/etc/nginx/security_headers.conf:ro
      - type: tmpfs
        target: /var/cache/nginx
        tmpfs:
          size: 134217728  # 128 MB
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db_data:
  redis_data:
  minio_data:
networks:
  fastauto-network: